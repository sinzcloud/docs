worker_processes auto;

events {
    worker_connections 10240;
}

# ==========================
# MQTT TCP Load Balancing
# ==========================
stream {

    upstream mqtt_backend {
        # 同一客户端IP尽量固定到同一台broker，减少断线/会话漂移问题
        hash $remote_addr consistent;

        server emqx1:1883 max_fails=3 fail_timeout=10s;
        server emqx2:1883 max_fails=3 fail_timeout=10s;
        server emqx3:1883 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 1883;
        proxy_pass mqtt_backend;

        proxy_connect_timeout 5s;
        proxy_timeout 1h;
    }
}

# ==========================
# Dashboard (固定单节点避免401)
# ==========================
http {

    server {
        listen 18083;

        location / {
            proxy_pass http://emqx1:18083;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }
    }
}