version: "3.8"

services:
  nginx:
    image: nginx:1.25
    container_name: iot-nginx
    restart: always
    ports:
      - "1883:1883"
      - "18083:18083"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - iot-net
    depends_on:
      - emqx1
      - emqx2
      - emqx3

  emqx1:
    image: emqx/emqx:5.5.0
    container_name: emqx1
    hostname: emqx1.cluster.local
    restart: always
    environment:
      - EMQX_NODE_NAME=emqx@emqx1.cluster.local
      - EMQX_NODE__COOKIE=emqx_prod_cookie
      - EMQX_NODE__NAME_DOMAIN=cluster.local

      - EMQX_CLUSTER__DISCOVERY_STRATEGY=static
      - EMQX_CLUSTER__STATIC__SEEDS=[emqx@emqx1.cluster.local,emqx@emqx2.cluster.local,emqx@emqx3.cluster.local]

      - EMQX_NODE__DIST_LISTEN_MIN=5369
      - EMQX_NODE__DIST_LISTEN_MAX=5369

      - EMQX_LISTENERS__TCP__DEFAULT__BIND=0.0.0.0:1883
      - EMQX_DASHBOARD__LISTENERS__HTTP__BIND=0.0.0.0:18083
      - EMQX_DASHBOARD__DEFAULT_USERNAME=admin
      - EMQX_DASHBOARD__DEFAULT_PASSWORD=public

    volumes:
      - ./emqx1/data:/opt/emqx/data
      - ./emqx1/log:/opt/emqx/log
    networks:
      - iot-net

  emqx2:
    image: emqx/emqx:5.5.0
    container_name: emqx2
    hostname: emqx2.cluster.local
    restart: always
    environment:
      - EMQX_NODE_NAME=emqx@emqx2.cluster.local
      - EMQX_NODE__COOKIE=emqx_prod_cookie
      - EMQX_NODE__NAME_DOMAIN=cluster.local

      - EMQX_CLUSTER__DISCOVERY_STRATEGY=static
      - EMQX_CLUSTER__STATIC__SEEDS=[emqx@emqx1.cluster.local,emqx@emqx2.cluster.local,emqx@emqx3.cluster.local]

      - EMQX_NODE__DIST_LISTEN_MIN=5369
      - EMQX_NODE__DIST_LISTEN_MAX=5369

      - EMQX_LISTENERS__TCP__DEFAULT__BIND=0.0.0.0:1883
      - EMQX_DASHBOARD__LISTENERS__HTTP__BIND=0.0.0.0:18083
      - EMQX_DASHBOARD__DEFAULT_USERNAME=admin
      - EMQX_DASHBOARD__DEFAULT_PASSWORD=public

    volumes:
      - ./emqx2/data:/opt/emqx/data
      - ./emqx2/log:/opt/emqx/log
    networks:
      - iot-net

  emqx3:
    image: emqx/emqx:5.5.0
    container_name: emqx3
    hostname: emqx3.cluster.local
    restart: always
    environment:
      - EMQX_NODE_NAME=emqx@emqx3.cluster.local
      - EMQX_NODE__COOKIE=emqx_prod_cookie
      - EMQX_NODE__NAME_DOMAIN=cluster.local

      - EMQX_CLUSTER__DISCOVERY_STRATEGY=static
      - EMQX_CLUSTER__STATIC__SEEDS=[emqx@emqx1.cluster.local,emqx@emqx2.cluster.local,emqx@emqx3.cluster.local]

      - EMQX_NODE__DIST_LISTEN_MIN=5369
      - EMQX_NODE__DIST_LISTEN_MAX=5369

      - EMQX_LISTENERS__TCP__DEFAULT__BIND=0.0.0.0:1883
      - EMQX_DASHBOARD__LISTENERS__HTTP__BIND=0.0.0.0:18083
      - EMQX_DASHBOARD__DEFAULT_USERNAME=admin
      - EMQX_DASHBOARD__DEFAULT_PASSWORD=public

    volumes:
      - ./emqx3/data:/opt/emqx/data
      - ./emqx3/log:/opt/emqx/log
    networks:
      - iot-net

  mysql:
    image: mysql:8.0
    container_name: iot-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=iot
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - iot-net

  redis:
    image: redis:7.0-alpine
    container_name: iot-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - iot-net

  influxdb:
    image: influxdb:2.7
    container_name: iot-influxdb
    restart: always
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123
      - DOCKER_INFLUXDB_INIT_ORG=iot
      - DOCKER_INFLUXDB_INIT_BUCKET=telemetry
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-auth-token
    networks:
      - iot-net

networks:
  iot-net:
    name: iot-net